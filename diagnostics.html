<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnostics — Mission Momentum</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ocean: #002366; --ocean-mid: #002d7a;
      --horizon: #3A6DB5; --horizon-mid: #4d7dc0;
      --mist: #D6E4F5; --fog: #F0F4F9;
      --ink: #1A1F2E; --slate: #4A5568; --stone: #8A9BB0;
      --white: #FFFFFF;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Josefin Sans', sans-serif; background: var(--fog); color: var(--ink); font-size: 18px; line-height: 1.5; margin: 0; }

    nav { background: var(--ocean); border-bottom: 2px solid var(--horizon); padding: 0 3rem; height: 72px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 18px; font-weight: 700; text-decoration: none; letter-spacing: 0.02em; }
    .nav-brand .brand-sub { font-size: 10px; font-weight: 400; color: var(--mist); letter-spacing: 0.1em; text-transform: uppercase; display: block; line-height: 1; margin-top: 3px; }
    .nav-back { color: var(--mist); font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; display: flex; align-items: center; gap: 6px; }
    .nav-back:hover { color: var(--white); }

    .tab-bar { background: var(--ocean-mid); border-bottom: 1px solid rgba(214,228,245,0.15); padding: 0 3rem; display: flex; gap: 4px; overflow-x: auto; position: sticky; top: 72px; z-index: 99; }
    .tab-btn { font-family: 'Josefin Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: rgba(214,228,245,0.7); background: transparent; border: none; border-bottom: 3px solid transparent; padding: 14px 18px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--white); border-bottom-color: var(--horizon); }

    .page-header { background: var(--ocean); padding: 2.5rem 3rem 2rem; }
    .page-header-inner { max-width: 820px; margin: 0 auto; }
    .page-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mist); margin-bottom: 0.75rem; opacity: 0.7; }
    .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; color: var(--white); line-height: 1.1; margin-bottom: 0.75rem; }
    .page-header p { font-size: 1.05rem; color: rgba(214,228,245,0.8); max-width: 620px; }

    main { max-width: 820px; margin: 0 auto; padding: 2.5rem 3rem 5rem; }
    .tool-panel { display: none; }
    .tool-panel.active { display: block; }

    .card { background: var(--white); border-radius: 8px; padding: 2rem 2.5rem; margin-bottom: 1.5rem; border: 1px solid var(--mist); }
    .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--horizon); margin-bottom: 1rem; }

    .role-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0; }
    .role-btn, .type-btn { font-family: 'Josefin Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; padding: 10px 20px; border: 1.5px solid var(--mist); border-radius: 4px; background: var(--white); color: var(--slate); cursor: pointer; transition: all 0.15s; }
    .role-btn:hover, .type-btn:hover { border-color: var(--horizon); color: var(--ocean); }
    .role-btn.active { background: var(--ocean); color: var(--white); border-color: var(--ocean); }
    .type-btn.active { background: var(--horizon); color: var(--white); border-color: var(--horizon); }

    .field-label { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ocean); margin-bottom: 0.5rem; display: block; margin-top: 1.5rem; }
    .field-hint { font-size: 13px; color: var(--stone); margin-bottom: 0.75rem; font-weight: 400; }
    textarea { font-family: 'Josefin Sans', sans-serif; font-size: 15px; width: 100%; padding: 14px 16px; border: 1.5px solid var(--mist); border-radius: 4px; color: var(--ink); background: var(--fog); resize: vertical; outline: none; line-height: 1.6; transition: border-color 0.15s; }
    textarea:focus { border-color: var(--horizon); background: var(--white); }
    input[type="text"] { font-family: 'Josefin Sans', sans-serif; font-size: 15px; width: 100%; padding: 12px 16px; border: 1.5px solid var(--mist); border-radius: 4px; color: var(--ink); background: var(--fog); outline: none; transition: border-color 0.15s; }
    input[type="text"]:focus { border-color: var(--horizon); background: var(--white); }

    .btn-run { font-family: 'Josefin Sans', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 40px; background: var(--ocean); color: var(--white); border: none; border-radius: 4px; cursor: pointer; transition: background 0.15s; display: inline-flex; align-items: center; gap: 10px; margin-top: 1.5rem; }
    .btn-run:hover { background: var(--horizon); }
    .btn-run:disabled { background: var(--stone); cursor: not-allowed; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn-run.loading .spinner { display: block; }
    .btn-run.loading .btn-label { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .api-warning { background: #fff8e6; border: 1px solid #f0c040; border-radius: 4px; padding: 1rem 1.25rem; font-size: 14px; color: #7a5c00; margin-bottom: 1.5rem; display: none; }
    .api-warning a { color: var(--horizon); }

    .results-section { display: none; }
    .results-section.visible { display: block; }

    .results-header { background: var(--ocean); border-radius: 8px; padding: 2rem 2.5rem; margin-bottom: 1.5rem; color: var(--white); }
    .results-header h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
    .results-header p { font-size: 0.95rem; color: rgba(214,228,245,0.8); }

    .scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .score-card { background: var(--white); border: 1px solid var(--mist); border-radius: 8px; padding: 1.25rem 1.5rem; }
    .score-card.weak { border-left: 4px solid #e05c5c; }
    .score-card.strong { border-left: 4px solid #3ab87a; }
    .score-card.mid { border-left: 4px solid #f0a030; }
    .score-category { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone); margin-bottom: 0.4rem; }
    .score-value { font-size: 2rem; font-weight: 700; color: var(--ocean); line-height: 1; margin-bottom: 0.4rem; }
    .score-value span { font-size: 1rem; color: var(--stone); font-weight: 400; }
    .score-bar-track { height: 5px; background: var(--mist); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; }
    .score-bar-fill.weak { background: #e05c5c; }
    .score-bar-fill.strong { background: #3ab87a; }
    .score-bar-fill.mid { background: #f0a030; }
    .score-note { font-size: 12px; color: var(--slate); margin-top: 0.5rem; line-height: 1.4; }

    .section-heading { font-size: 1rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ocean); margin-bottom: 1rem; }
    .flag-item { display: flex; gap: 0.75rem; margin-bottom: 0.85rem; align-items: flex-start; }
    .flag-dot { width: 8px; height: 8px; border-radius: 50%; background: #e05c5c; flex-shrink: 0; margin-top: 7px; }
    .flag-text { font-size: 1rem; color: var(--slate); line-height: 1.5; }

    .rewrite-block { background: var(--fog); border-radius: 6px; padding: 1.5rem; margin-bottom: 1rem; }
    .rewrite-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .rewrite-label.before { color: #e05c5c; }
    .rewrite-label.after { color: #3ab87a; }
    .rewrite-text { font-size: 1rem; color: var(--ink); line-height: 1.6; font-style: italic; }
    .rewrite-divider { border: none; border-top: 1px solid var(--mist); margin: 1rem 0; }

    .subject-block { background: var(--fog); border-radius: 6px; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .subject-text { font-size: 1rem; color: var(--ink); font-weight: 600; }
    .btn-copy-subject { font-family: 'Josefin Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; background: var(--white); color: var(--horizon); border: 1.5px solid var(--horizon); border-radius: 4px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-copy-subject:hover { background: var(--horizon); color: var(--white); }

    .overall-score-band { background: var(--horizon); border-radius: 8px; padding: 1.75rem 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 2rem; }
    .overall-num { font-size: 3.5rem; font-weight: 700; color: var(--white); line-height: 1; }
    .overall-num span { font-size: 1.5rem; color: rgba(214,228,245,0.7); }
    .overall-text h3 { font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 0.25rem; }
    .overall-text p { font-size: 0.95rem; color: rgba(214,228,245,0.85); line-height: 1.5; }

    .btn-print { font-family: 'Josefin Sans', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 28px; background: transparent; color: var(--ocean); border: 1.5px solid var(--ocean); border-radius: 4px; cursor: pointer; transition: all 0.15s; }
    .btn-print:hover { background: var(--ocean); color: var(--white); }

    .error-box { background: #fff0f0; border: 1px solid #f5c0c0; border-radius: 4px; padding: 1rem 1.25rem; font-size: 14px; color: #9b2020; margin-top: 1rem; display: none; }

    footer { background: var(--ink); padding: 2rem 3rem; text-align: center; margin-top: 4rem; }
    .footer-sub { font-size: 13px; color: var(--stone); }
    .footer-sub a { color: var(--mist); text-decoration: none; }
    .footer-sub a:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      nav, .tab-bar { padding: 0 1.25rem; }
      .page-header { padding: 2rem 1.25rem; }
      main { padding: 1.5rem 1.25rem 4rem; }
      .card { padding: 1.5rem; }
      .scores-grid { grid-template-columns: 1fr; }
      .overall-score-band { flex-direction: column; gap: 1rem; }
      .subject-block { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Mission Momentum<span class="brand-sub">Stronger Copy. Deeper Impact.</span></a>
  <a href="index.html" class="nav-back">← Back to Mission Momentum</a>
</nav>

<div class="tab-bar" id="tabBar"></div>

<div class="page-header">
  <div class="page-header-inner">
    <div class="page-eyebrow" id="pageEyebrow"></div>
    <h1 id="pageTitle"></h1>
    <p id="pageSub"></p>
  </div>
</div>

<main id="main"></main>

<footer>
  <div class="footer-sub">Mission Momentum is part of the <a href="https://plainspeakingcomms.com/psc-tools" target="_blank">PSC Tools</a> suite &nbsp;Â·&nbsp; AI powered by <a href="https://anthropic.com" target="_blank">Claude</a></div>
</footer>

<script>
const TOOLS = [
  {
    id: 'donor',
    tab: 'Donor appeal',
    eyebrow: 'Diagnostic 1 of 5',
    title: 'Donor appeal diagnostic',
    sub: "Paste your donor appeal below. You'll get a score across six categories, flagged issues, and targeted rewrites for your two weakest sections.",
    contextLabel: 'Campaign context (optional)',
    contextPlaceholder: 'e.g. End-of-year appeal for a food bank, goal of $50k, mid-level donors',
    copyHint: 'Paste the full text of your appeal. P.S. included if you have it.',
    copyPlaceholder: 'Paste your donor appeal here...',
    hasSubjectLine: true,
    categories: ['Donor-centered language', 'Clarity of the ask', 'Emotional connection and storytelling', 'Urgency and specificity', 'Call to action effectiveness', 'Overall readability'],
    buildPrompt: (role, context, copy) => `You are a nonprofit fundraising communications expert. Evaluate the following donor appeal copy for a ${role}.
${context ? `Campaign context: ${context}` : ''}

DONOR APPEAL COPY:
${copy}

Evaluate this appeal across exactly these six categories: Donor-centered language, Clarity of the ask, Emotional connection and storytelling, Urgency and specificity, Call to action effectiveness, Overall readability.

Be honest and specific. Reference actual language from the copy. Do not be generic.`
  },
  {
    id: 'thankyou',
    tab: 'Thank-you letter',
    eyebrow: 'Diagnostic 2 of 5',
    title: 'Thank-you letter diagnostic',
    sub: 'A thank-you that just says "thanks" is a missed chance to deepen the relationship. Get feedback on whether your letter connects the gift to real impact.',
    contextLabel: 'Donor context (optional)',
    contextPlaceholder: 'e.g. First-time donor, $250 gift to annual fund, food bank',
    copyHint: 'Paste the full text of your letter. Include the salutation and signature if you have them.',
    copyPlaceholder: 'Paste your thank-you letter here...',
    hasSubjectLine: true,
    categories: ['Warmth and personalization', 'Impact confirmation', 'Tone: grateful vs. transactional', 'Donor recognition and specificity', 'Connection to mission', 'Overall readability'],
    buildPrompt: (role, context, copy) => `You are a nonprofit fundraising communications expert. Evaluate the following donor thank-you letter for a ${role}.
${context ? `Donor context: ${context}` : ''}

THANK-YOU LETTER COPY:
${copy}

Evaluate this letter across exactly these six categories: Warmth and personalization, Impact confirmation, Tone: grateful vs. transactional, Donor recognition and specificity, Connection to mission, Overall readability.

Be honest and specific. Reference actual language from the copy. A good thank-you letter makes the donor feel seen, valued, and connected to real impact. A transactional one just confirms the gift. Do not be generic.`
  },
  {
    id: 'lapsed',
    tab: 'Lapsed donor',
    eyebrow: 'Diagnostic 3 of 5',
    title: 'Lapsed donor re-engagement diagnostic',
    sub: "Paste your re-engagement email or letter and get a diagnosis built for winning back someone who's already drifted away.",
    contextLabel: 'Lapsed donor context (optional)',
    contextPlaceholder: 'e.g. Donors lapsed 18+ months, last gift average $100, mid-size environmental nonprofit',
    copyHint: 'Paste the full text of your win-back email or letter.',
    copyPlaceholder: 'Paste your lapsed donor re-engagement copy here...',
    hasSubjectLine: true,
    categories: ['Acknowledgment of the lapse', 'Tone: welcoming vs. guilt-inducing', 'Relevance of the renewed ask', 'What has changed or improved', 'Specificity of impact', 'Overall readability'],
    buildPrompt: (role, context, copy) => `You are a nonprofit fundraising communications expert. Evaluate the following lapsed donor re-engagement email or letter for a ${role}.
${context ? `Lapsed donor context: ${context}` : ''}

RE-ENGAGEMENT COPY:
${copy}

Evaluate this copy across exactly these six categories: Acknowledgment of the lapse, Tone: welcoming vs. guilt-inducing, Relevance of the renewed ask, What has changed or improved, Specificity of impact, Overall readability.

Be honest and specific. Reference actual language from the copy. A strong re-engagement piece acknowledges the lapse without guilt, shows what has changed, and makes a specific, relevant renewed ask. Do not be generic.`
  },
  {
    id: 'positioning',
    tab: 'Positioning',
    eyebrow: 'Diagnostic 4 of 5',
    title: 'Positioning and messaging diagnostic',
    sub: 'Paste your about page, mission statement, elevator pitch, or homepage headline. Find out whether it passes the ten-second stranger test.',
    contextLabel: 'Organization context (optional)',
    contextPlaceholder: 'e.g. Mid-size environmental nonprofit, primary audience is individual donors and foundation funders',
    copyHint: 'Paste your about page, mission statement, homepage hero copy, or elevator pitch.',
    copyPlaceholder: 'Paste your positioning and messaging copy here...',
    hasSubjectLine: false,
    categories: ['Clarity of who you serve', 'Clarity of what you do', 'Differentiation', 'Plain language vs. jargon', 'Emotional resonance', 'Memorability'],
    buildPrompt: (role, context, copy) => `You are a nonprofit communications strategist and messaging expert. Evaluate the following positioning and messaging copy for a ${role}.
${context ? `Organization context: ${context}` : ''}

POSITIONING COPY:
${copy}

Apply the ten-second stranger test: could a person who has never heard of this organization understand who they are, who they serve, and why it matters within ten seconds of reading this copy?

Evaluate across exactly these six categories: Clarity of who you serve, Clarity of what you do, Differentiation, Plain language vs. jargon, Emotional resonance, Memorability.

Be honest and specific. Strong positioning passes the ten-second stranger test, uses plain language, and says something only this organization could say. Flag insider language, vague mission statements, and generic claims. Do not be generic.`
  },
  {
    id: 'newsletter',
    tab: 'Newsletter',
    eyebrow: 'Diagnostic 5 of 5',
    title: 'Newsletter and impact report diagnostic',
    sub: 'Check whether your newsletter or impact report opens with outcomes and real stories, or gets buried in activity updates before anyone gets to why it matters.',
    contextLabel: 'Publication context (optional)',
    contextPlaceholder: 'e.g. Quarterly newsletter, primary audience is major donors and board members',
    copyHint: 'Paste a section or the full text. The more context you provide, the more specific the feedback.',
    copyPlaceholder: 'Paste your newsletter or impact report copy here...',
    hasSubjectLine: true,
    hasTypeToggle: true,
    categories: ['Story vs. statistics balance', 'Outcome clarity', 'Donor visibility', 'Readability and scannability', 'Emotional engagement', 'Call to action or next step'],
    buildPrompt: (role, context, copy, type) => {
      const typeLabel = type === 'impact' ? 'impact report' : 'newsletter';
      return `You are a nonprofit communications expert. Evaluate the following ${typeLabel} copy for a ${role}.
${context ? `Publication context: ${context}` : ''}

${typeLabel.toUpperCase()} COPY:
${copy}

Evaluate across exactly these six categories: Story vs. statistics balance, Outcome clarity, Donor visibility, Readability and scannability, Emotional engagement, Call to action or next step.

Be honest and specific. Strong ${typeLabel} copy leads with human stories, shows real outcomes not just outputs, and makes donors feel like partners in the work. Flag activity-focused writing, jargon, buried impact, and missing calls to action. Reference actual language. Do not be generic.`;
    }
  }
];

const ROLES = [
  { id: 'marketing', label: 'Marketing staff' },
  { id: 'ed', label: 'Executive director' },
  { id: 'consultant', label: 'Fundraising consultant' }
];

const state = {};
TOOLS.forEach(t => {
  state[t.id] = { role: 'marketing', type: 'newsletter', context: '', copy: '', subjectLine: '', results: null, error: null, loading: false };
});

let activeTool = 'donor';
const KEY = 'mm_api_key';

function roleLabel(roleId) {
  return ROLES.find(r => r.id === roleId).label.toLowerCase();
}

function scoreClass(s) {
  if (s >= 70) return 'strong';
  if (s >= 45) return 'mid';
  return 'weak';
}

function renderTabBar() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = TOOLS.map(t =>
    `<button class="tab-btn ${t.id === activeTool ? 'active' : ''}" onclick="switchTool('${t.id}')">${t.tab}</button>`
  ).join('');
}

function switchTool(id) {
  activeTool = id;
  history.replaceState(null, '', '#' + id);
  renderTabBar();
  renderPage();
}

function renderPage() {
  const tool = TOOLS.find(t => t.id === activeTool);
  const s = state[tool.id];

  document.getElementById('pageEyebrow').textContent = tool.eyebrow;
  document.getElementById('pageTitle').textContent = tool.title;
  document.getElementById('pageSub').textContent = tool.sub;

  const apiKey = localStorage.getItem(KEY);

  const main = document.getElementById('main');
  main.innerHTML = `
    ${!apiKey ? `<div class="api-warning" style="display:block;">No API key found. <a href="index.html#api-key-setup">Go back to set up your key</a> before running a diagnostic.</div>` : ''}
    <div class="card">
      <div class="card-label">Your role</div>
      <div class="role-row">
        ${ROLES.map(r => `<button class="role-btn ${s.role === r.id ? 'active' : ''}" onclick="setRole('${r.id}', this)">${r.label}</button>`).join('')}
      </div>

      ${tool.hasTypeToggle ? `
        <div class="field-label">Type</div>
        <div class="role-row">
          <button class="type-btn ${s.type === 'newsletter' ? 'active' : ''}" onclick="setType('newsletter', this)">Newsletter</button>
          <button class="type-btn ${s.type === 'impact' ? 'active' : ''}" onclick="setType('impact', this)">Impact report</button>
        </div>
      ` : ''}

      <div class="field-label">${tool.contextLabel}</div>
      <input type="text" id="contextInput" placeholder="${tool.contextPlaceholder}" value="${s.context.replace(/"/g, '&quot;')}" oninput="state['${tool.id}'].context = this.value" />

      ${tool.hasSubjectLine ? `
        <div class="field-label">Email subject line <span style="color:#e05c5c;">*</span></div>
        <input type="text" id="subjectLineInput" placeholder="e.g. You changed everything for Maria this year" value="${s.subjectLine.replace(/\"/g, '&quot;')}" oninput="state['${tool.id}'].subjectLine = this.value" />
      ` : ''}
      <div class="field-label">Your copy</div>
      <p class="field-hint">${tool.copyHint}</p>
      <textarea id="copyInput" rows="14" placeholder="${tool.copyPlaceholder}" oninput="state['${tool.id}'].copy = this.value">${s.copy}</textarea>

      <button class="btn-run ${s.loading ? 'loading' : ''}" id="runBtn" ${s.loading ? 'disabled' : ''} onclick="runDiagnostic()">
        <span class="spinner"></span><span class="btn-label">Run diagnostic</span>
      </button>
      <div class="error-box" id="errorBox" style="${s.error ? 'display:block;' : ''}">${s.error || ''}</div>
    </div>

    <div class="results-section ${s.results ? 'visible' : ''}" id="resultsSection">
      ${s.results ? renderResultsHTML(tool, s.results, s.subjectLine) : ''}
    </div>
  `;
}

function setRole(roleId, btn) {
  state[activeTool].role = roleId;
  btn.parentElement.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setType(type, btn) {
  state[activeTool].type = type;
  btn.parentElement.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function runDiagnostic() {
  const tool = TOOLS.find(t => t.id === activeTool);
  const s = state[tool.id];
  const apiKey = localStorage.getItem(KEY);

  if (!apiKey) {
    s.error = 'No API key found. Go back to the homepage and save your key first.';
    renderPage();
    return;
  }
  if (!s.copy || !s.copy.trim()) {
    s.error = 'Paste some copy first.';
    renderPage();
    return;
  }
  if (tool.hasSubjectLine && (!s.subjectLine || !s.subjectLine.trim())) {
    s.error = 'Add an email subject line first \u2014 it is required for this diagnostic.';
    renderPage();
    return;
  }

  s.loading = true;
  s.error = null;
  renderPage();

  let prompt = tool.buildPrompt(roleLabel(s.role), s.context, s.copy, s.type);

  const subjectLineInstruction = tool.hasSubjectLine
    ? `\n\nAlso separately evaluate this email subject line (do not factor it into the overall score or the six categories above): "${s.subjectLine}"\n\nScore it 0-100 on how likely it is to get opened, explain why in one sentence, and suggest one improved rewrite likely to increase open rates. Include this as "subject_line" in the JSON below with keys "score", "note", and "rewrite".`
    : '';

  const schema = `

Respond ONLY in valid JSON with this structure:
{
  "overall_score": <number 0-100>,
  "overall_summary": "<2 sentences summarizing the main strengths and biggest opportunity>",
  "categories": [
    ${tool.categories.map(c => `{ "name": "${c}", "score": <0-100>, "note": "<one sentence explanation>" }`).join(',\n    ')}
  ],
  "flags": [
    "<specific issue found in the copy, referencing actual language where possible>",
    "<specific issue>",
    "<specific issue>"
  ],
  "rewrites": [
    { "category": "<name of weakest category>", "before": "<exact excerpt, max 60 words>", "after": "<improved rewrite>", "explanation": "<one sentence>" },
    { "category": "<name of second weakest category>", "before": "<exact excerpt, max 60 words>", "after": "<improved rewrite>", "explanation": "<one sentence>" }
  ],
  "strengths": [
    "<something the copy does well, specific>",
    "<something the copy does well, specific>"
  ]${tool.hasSubjectLine ? ',\n  "subject_line": { "score": <0-100>, "note": "<one sentence explanation>", "rewrite": "<improved subject line>" }' : ''}
}

Return only valid JSON, no markdown fences.`;

  prompt = prompt + subjectLineInstruction + schema;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'API error');

    const result = JSON.parse(data.content[0].text);
    s.results = result;
    s.loading = false;
    renderPage();
    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    s.loading = false;
    s.error = 'Something went wrong: ' + err.message + '. Check your API key and try again.';
    renderPage();
  }
}

function renderResultsHTML(tool, r, subjectLine) {
  const overallCls = scoreClass(r.overall_score);
  const bandColor = overallCls === 'weak' ? '#9b2020' : overallCls === 'mid' ? '#a06010' : 'var(--horizon)';
  const label = r.overall_score >= 70 ? 'Strong' : r.overall_score >= 45 ? 'Needs work' : 'Significant gaps';

  const scoresHTML = r.categories.map(cat => {
    const c = scoreClass(cat.score);
    return `<div class="score-card ${c}"><div class="score-category">${cat.name}</div><div class="score-value">${cat.score}<span>/100</span></div><div class="score-bar-track"><div class="score-bar-fill ${c}" style="width:${cat.score}%"></div></div><div class="score-note">${cat.note}</div></div>`;
  }).join('');

  const flagsHTML = r.flags.map(f => `<div class="flag-item"><div class="flag-dot"></div><div class="flag-text">${f}</div></div>`).join('');

  const rewritesHTML = r.rewrites.map(rw => `
    <div class="rewrite-block">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--horizon);margin-bottom:0.75rem;">${rw.category}</div>
      <div class="rewrite-label before">Original</div>
      <div class="rewrite-text">${rw.before}</div>
      <hr class="rewrite-divider">
      <div class="rewrite-label after">Rewritten</div>
      <div class="rewrite-text">${rw.after}</div>
      <div style="font-size:13px;color:var(--stone);margin-top:0.75rem;">${rw.explanation}</div>
    </div>`).join('');

  const strengthsHTML = r.strengths.map(s => `<div class="flag-item"><div class="flag-dot" style="background:#3ab87a"></div><div class="flag-text">${s}</div></div>`).join('');

  const subjectLineHTML = (tool.hasSubjectLine && r.subject_line) ? `
    <div class="card" style="border-left:4px solid var(--horizon);">
      <div class="section-heading">Email subject line <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--stone);font-size:12px;">(scored separately, not part of the diagnostic above)</span></div>
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
        <div style="font-size:2rem;font-weight:700;color:var(--horizon);line-height:1;">${r.subject_line.score}<span style="font-size:1rem;color:var(--stone);font-weight:400;">/100</span></div>
        <div style="font-size:0.95rem;color:var(--slate);">${r.subject_line.note}</div>
      </div>
      <div class="rewrite-block">
        <div class="rewrite-label before">Your subject line</div>
        <div class="rewrite-text">${subjectLine}</div>
        <hr class="rewrite-divider">
        <div class="rewrite-label after">Suggested rewrite</div>
        <div class="rewrite-text">${r.subject_line.rewrite}</div>
      </div>
      <div class="subject-block" style="margin-top:1rem;">
        <div class="subject-text">${r.subject_line.rewrite}</div>
        <button class="btn-copy-subject" onclick="copySubject(this)" data-subject="${r.subject_line.rewrite.replace(/"/g, '&quot;')}">Copy</button>
      </div>
    </div>
  ` : '';

  return `
    <div class="results-header">
      <h2>${tool.title} report</h2>
      <p>Generated ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
    </div>
    <div class="overall-score-band" style="background:${bandColor};">
      <div class="overall-num">${r.overall_score}<span>/100</span></div>
      <div class="overall-text"><h3>${label}</h3><p>${r.overall_summary}</p></div>
    </div>
    <div class="scores-grid">${scoresHTML}</div>
    <div class="card">
      <div class="section-heading">Flagged issues</div>
      ${flagsHTML}
    </div>
    <div class="card">
      <div class="section-heading">Suggested rewrites</div>
      ${rewritesHTML}
    </div>
    ${subjectLineHTML}
    <div class="card">
      <div class="section-heading">What's working</div>
      ${strengthsHTML}
    </div>
    <button class="btn-print" onclick="window.print()">Print or save as PDF</button>
  `;
}

function copySubject(btn) {
  const text = btn.getAttribute('data-subject');
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}

const initialHash = window.location.hash.slice(1);
if (TOOLS.some(t => t.id === initialHash)) activeTool = initialHash;
renderTabBar();
renderPage();
</script>
</body>
</html>
